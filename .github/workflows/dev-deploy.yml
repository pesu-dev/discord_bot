name: Dev Deploy

on:
  push:
    branches:
      - dev

env:
  DEPLOYMENT_PATH: ${{ vars.DEV_DEPLOYMENT_PATH }}
  REPO_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ vars.DEV_DOCKER_IMAGE_TAG }}
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
  CONTAINER_NAME: ${{ vars.DEV_DOCKER_CONTAINER_NAME }}

jobs:
  build_and_push_image:
    uses: ./.github/workflows/build-and-push-image.yml
    with:
      tag: dev

  deploy:
    name: Deploy image to dev
    needs: [build_and_push_image]
    runs-on: ubuntu-latest
    concurrency:
      group: dev-deploy
      cancel-in-progress: false
    steps:
      - name: Run deployment script
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          fingerprint: ${{ secrets.VM_FINGERPRINT }}
          envs: REPO_OWNER,IMAGE_TAG,CONTAINER_NAME,DEPLOYMENT_PATH
          script: |
            set -e

            cd $DEPLOYMENT_PATH

            echo "Pulling latest code..."
            git reset --hard HEAD
            git pull origin dev

            echo "Pulling latest Docker image..."
            docker compose pull

            echo "Restarting container..."
            docker compose up -d

            echo "Checking container status..."
            sleep 10

            if docker ps --filter "name=${CONTAINER_NAME}" --filter "status=running" --format '{{.Names}}' | grep -q "${CONTAINER_NAME}"; then
                echo "Container is running successfully."
            else
                echo "Container failed to start."
                docker logs ${CONTAINER_NAME} --tail 50
                exit 1
            fi

            echo "Deployment complete."
