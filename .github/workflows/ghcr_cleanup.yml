name: GHCR Cleanup

on:
  workflow_dispatch:
    inputs:
      keep_sha_tags:
        description: Number of newest sha_* tags to keep
        required: false
        default: 20
        type: number
  workflow_call:
    inputs:
      keep_sha_tags:
        required: false
        default: 20
        type: number

permissions:
  packages: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'discord_bot' }}
      KEEP_SHA_TAGS: ${{ inputs.keep_sha_tags }}
    steps:
      - name: Delete stale sha_* package versions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = process.env.DOCKER_IMAGE_NAME;
            const keep = Number(process.env.KEEP_SHA_TAGS || "20");
            const shaTagRegex = /^sha_[0-9a-f]{40}$/;

            const isOrg = await github.rest.orgs
              .get({ org: owner })
              .then(() => true)
              .catch(() => false);

            const listFn = isOrg
              ? (params) =>
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                    org: owner,
                    package_type: "container",
                    package_name: packageName,
                    ...params,
                  })
              : (params) =>
                  github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                    username: owner,
                    package_type: "container",
                    package_name: packageName,
                    ...params,
                  });

            const deleteFn = isOrg
              ? (versionId) =>
                  github.rest.packages.deletePackageVersionForOrg({
                    org: owner,
                    package_type: "container",
                    package_name: packageName,
                    package_version_id: versionId,
                  })
              : (versionId) =>
                  github.rest.packages.deletePackageVersionForUser({
                    username: owner,
                    package_type: "container",
                    package_name: packageName,
                    package_version_id: versionId,
                  });

            const versions = await github.paginate(listFn, { per_page: 100 });
            const pruneCandidates = versions
              .map((version) => {
                const tags = version.metadata?.container?.tags || [];
                const hasStableTag = tags.some((tag) => ["dev", "prod", "latest", "rollback"].includes(tag));
                const hasShaTag = tags.some((tag) => shaTagRegex.test(tag));
                return { version, tags, hasStableTag, hasShaTag };
              })
              .filter(({ hasStableTag, hasShaTag }) => hasShaTag && !hasStableTag)
              .sort((a, b) => new Date(b.version.created_at) - new Date(a.version.created_at));

            const toDelete = pruneCandidates.slice(keep);
            core.info(
              `Found ${pruneCandidates.length} sha_only versions, keeping ${Math.min(
                keep,
                pruneCandidates.length,
              )}, deleting ${toDelete.length}.`,
            );

            for (const entry of toDelete) {
              const versionId = entry.version.id;
              const tags = entry.tags.join(", ");
              core.info(`Deleting package version ${versionId} (tags: ${tags})`);
              await deleteFn(versionId);
            }
