name: GHCR Cleanup

on:
  workflow_dispatch:
    inputs:
      keep_sha_tags:
        description: Number of newest sha_* tags to keep
        required: false
        default: 5
        type: number
  workflow_call:
    inputs:
      keep_sha_tags:
        required: false
        default: 5
        type: number

permissions:
  packages: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
      KEEP_SHA_TAGS: ${{ inputs.keep_sha_tags }}
    steps:
      - name: Delete stale sha_* package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ env.DOCKER_IMAGE_NAME }}
        run: |
          set -euo pipefail

          endpoint="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"

          versions_json="$(gh api --paginate "${endpoint}?per_page=100" | jq -s 'add // []')"

          to_delete_ids="$(echo "${versions_json}" | jq -r --argjson keep "${KEEP_SHA_TAGS}" '
            [ .[]
              | . as $v
              | ($v.metadata.container.tags // []) as $tags
              | (any($tags[]?; test("^sha_[0-9a-f]{40}$"))) as $has_sha
              | (any($tags[]?; . == "dev" or . == "prod" or . == "latest")) as $has_stable
              | select($has_sha and (not $has_stable))
            ]
            | sort_by(.created_at)
            | reverse
            | .[$keep:]
            | .[].id
          ')"

          total_candidates="$(echo "${versions_json}" | jq '
            [ .[]
              | . as $v
              | ($v.metadata.container.tags // []) as $tags
              | (any($tags[]?; test("^sha_[0-9a-f]{40}$"))) as $has_sha
              | (any($tags[]?; . == "dev" or . == "prod" or . == "latest")) as $has_stable
              | select($has_sha and (not $has_stable))
            ] | length
          ')"

          delete_count=0
          if [ -n "${to_delete_ids}" ]; then
            delete_count="$(echo "${to_delete_ids}" | wc -l | tr -d ' ')"
          fi

          echo "Found ${total_candidates} sha_only versions, keeping ${KEEP_SHA_TAGS}, deleting ${delete_count}."

          if [ -z "${to_delete_ids}" ]; then
            echo "No stale sha_* versions to delete."
            exit 0
          fi

          while IFS= read -r version_id; do
            [ -z "${version_id}" ] && continue
            echo "Deleting package version ${version_id}"
            gh api -X DELETE "${endpoint}/${version_id}"
          done <<< "${to_delete_ids}"
