name: Production Merge and Deploy

on: workflow_dispatch

env:
  DEPLOYMENT_PATH: ${{ vars.PROD_DEPLOYMENT_PATH }}
  REPO_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ vars.PROD_DOCKER_IMAGE_TAG }}
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
  CONTAINER_NAME: ${{ vars.PROD_DOCKER_CONTAINER_NAME }}

jobs:
  check-permissions:
    name: Check Permissions
    runs-on: ubuntu-latest
    steps:
      - name: Check if user has permissions
        id: check-permissions
        run: |
          set -e
          PERMISSION_GRANTED=0
          IFS=',' read -ra USERS <<< "${{ vars.PROD_DEPLOYMENT_ALLOWED_USERS }}"
          for user in "${USERS[@]}"; do
            if [[ "$user" == "${{ github.actor }}" ]]; then
              PERMISSION_GRANTED=1
              break
            fi
          done
          if [[ "$PERMISSION_GRANTED" -ne 1 ]]; then
            echo "❌ You do not have permission to trigger this workflow."
            exit 1
          fi
          echo "✅ Permission granted"
          echo "user=${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "allowed=true" >> $GITHUB_OUTPUT
  merge:
    name: Merge dev to main
    runs-on: ubuntu-latest
    needs: [check-permissions]
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
    concurrency:
      group: production-merge
      cancel-in-progress: false
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PESU_DEV_SUPERUSER_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest code from dev branch
        id: check-changes
        run: |
          set -e
          git fetch origin dev

          CHANGES=$(git rev-list main..origin/dev --count)
          echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          if [ "$CHANGES" -eq "0" ]; then
            echo "ℹ️ No new changes to deploy"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT 
            echo "📊 Found $CHANGES commits to merge"
            git log --oneline main..origin/dev
          fi

      - name: Merge changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git merge --ff origin/dev || {
            echo "❌ Merge conflict detected. Please resolve conflicts manually."
            git merge --abort
            exit 1
          }

      - name: Push changes to main branch
        if: steps.check-changes.outputs.has_changes == 'true'
        run: git push origin main

  rollback_image:
    name: Tag a rollback image
    needs: [merge]
    if: needs.merge.result == 'success' && needs.merge.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tagging Image as rollback
        run: |
          IMAGE=ghcr.io/${{ env.REPO_OWNER }}/${{ env.DOCKER_IMAGE_NAME }}
          docker pull $IMAGE:${{ env.IMAGE_TAG }}
          echo "Tagging current prod image as rollback"
          docker tag $IMAGE:${{ env.IMAGE_TAG }} $IMAGE:rollback
          echo "Pushing rollback tag"
          docker push $IMAGE:${{ env.IMAGE_TAG }}:rollback

  build_and_push_image:
    name: Build and push image to GHCR for production
    needs: [rollback_image]
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    uses: ./.github/workflows/build-and-push-image.yml
    with:
      tag: prod

  deploy:
    name: Deploy production image
    needs: [build_and_push_image]
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Run deployment script
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          fingerprint: ${{ secrets.VM_FINGERPRINT }}
          envs: REPO_OWNER,IMAGE_TAG,CONTAINER_NAME,DEPLOYMENT_PATH
          script: |
            set -e

            cd $DEPLOYMENT_PATH

            echo "Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "Pulling latest Docker image..."
            docker compose pull

            echo "Restarting container..."
            docker compose up -d

            echo "Checking container status..."
            sleep 10

            if docker ps --filter "name=${CONTAINER_NAME}" --filter "status=running" --format '{{.Names}}' | grep -q "${CONTAINER_NAME}"; then
                echo "Container is running successfully."
            else
                echo "Container failed to start."
                docker logs ${CONTAINER_NAME} --tail 50
                exit 1
            fi

            echo "Deployment complete."

  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.REPO_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Switch to rollback image
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          fingerprint: ${{ secrets.VM_FINGERPRINT }}
          envs: REPO_OWNER,DOCKER_IMAGE_NAME,CONTAINER_NAME,DEPLOYMENT_PATH
          script: |
            echo "Deployment failed. Rolling back..."
            cd $DEPLOYMENT_PATH
            docker rm -f $CONTAINER_NAME || true
            docker run -d \
              --name $CONTAINER_NAME \
              ghcr.io/$REPO_OWNER/$DOCKER_IMAGE_NAME:rollback
            echo "Rollback completed."
            exit 1
