name: Promote Dev to Production

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ vars.DOCKER_IMAGE_NAME }}

concurrency:
  group: production_deploy
  cancel-in-progress: false

jobs:
  resolve_target:
    name: Resolve promotion target
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve_sha.outputs.target_sha }}
      sha_tag: ${{ steps.resolve_sha.outputs.sha_tag }}
      has_changes: ${{ steps.resolve_sha.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve target SHA from dev
        id: resolve_sha
        run: |
          set -euo pipefail

          git fetch origin dev main --prune

          TARGET_SHA="$(git rev-parse origin/dev)"

          MAIN_SHA="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "${MAIN_SHA}" "${TARGET_SHA}"; then
            echo "main cannot be fast-forwarded to ${TARGET_SHA}. Manual intervention required."
            exit 1
          fi

          HAS_CHANGES="true"
          if [[ "${TARGET_SHA}" == "${MAIN_SHA}" ]]; then
            HAS_CHANGES="false"
            echo "No new commits between main and target SHA. Skipping production deployment."
          else
            echo "Promoting sha_${TARGET_SHA}"
          fi

          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha_${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "has_changes=${HAS_CHANGES}" >> "$GITHUB_OUTPUT"

  promote_and_deploy:
    name: Fast-forward main and deploy promoted SHA
    needs: [resolve_target]
    if: needs.resolve_target.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PESU_DEV_SUPERUSER_TOKEN }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Confirm target SHA is still valid
        run: |
          set -euo pipefail

          git fetch origin dev main --prune
          TARGET_SHA="${{ needs.resolve_target.outputs.target_sha }}"

          if ! git merge-base --is-ancestor "${TARGET_SHA}" origin/dev; then
            echo "Target SHA is no longer present on origin/dev."
            exit 1
          fi

          if ! git merge-base --is-ancestor main "${TARGET_SHA}"; then
            echo "main cannot be fast-forwarded to ${TARGET_SHA}. Manual intervention required."
            exit 1
          fi

      - name: Fast-forward merge main to promoted SHA
        run: |
          git merge --ff-only "${{ needs.resolve_target.outputs.target_sha }}"
          git push origin main

      - name: Deploy promoted SHA to prod
        id: deploy_prod
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          fingerprint: ${{ secrets.VM_FINGERPRINT }}
          script: prod ${{ needs.resolve_target.outputs.sha_tag }}

      - name: Rollback prod to last stable prod tag
        if: failure() && steps.deploy_prod.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          fingerprint: ${{ secrets.VM_FINGERPRINT }}
          script: prod prod

      - name: Mark deployment as failed after rollback
        if: steps.deploy_prod.outcome == 'failure'
        run: exit 1

      - name: Set up Docker Buildx
        if: steps.deploy_prod.outcome == 'success'
        uses: docker/setup-buildx-action@v3

      - name: GHCR login
        if: steps.deploy_prod.outcome == 'success'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag promoted SHA as prod
        if: steps.deploy_prod.outcome == 'success'
        run: docker buildx imagetools create -t "${IMAGE}:prod" "${IMAGE}:${{ needs.resolve_target.outputs.sha_tag }}"

  no_changes:
    name: Skip production deploy (no changes)
    needs: [resolve_target]
    if: needs.resolve_target.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip
        run: echo "No new commits to promote from dev to main. Deployment skipped."
