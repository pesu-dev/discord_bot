name: Source Checks

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - main

jobs:
  source_checks:
    name: Python source compilation checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile all Python modules
        run: python -m compileall -q .

  validate_pr_target:
    name: Validate PR target branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Validate PR target is dev
        run: |
          if [ "$TARGET_BRANCH" != "dev" ]; then
            echo "PR must target the dev branch."
            exit 1
          fi
